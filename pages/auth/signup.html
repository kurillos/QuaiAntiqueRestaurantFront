<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Inscription</h1>
    </div>
  </div>
  <div class="container">
    <form>
      <div class="mb-3">
        <label for="NomInput" class="form-label">Nom</label>
        <input type="text" class="form-control" id="NomInput" placeholder="Votre nom">
      </div>
      <div class="mb-3">
        <label for="PreomInput" class="form-label">Prénom</label>
        <input type="text" class="form-control" id="PreomInput" placeholder="Votre prénom">
      </div>
      <div class="mb-3">
        <label for="exampleInput" class="form-label">Email</label>
        <input type="email" class="form-control" id="exampleInput" placeholder="test@mail.fr">
      </div>
      <div class="mb-3">
        <label for="ValidatePasswordInput" class="form-label">Mot de passe</label>
        <input type="password" class="form-control" id="ValidatePasswordInput">
      </div>
      <div class="text-center">
        <button type="submit" class="btn btn-primary">Inscription</button>
      </div>
      
    </form>
  
    <div class="text-center pt-3">
      <a href="/signin">Vous déjà un compte ? Connectez-vous ici !</a>
    </div>
  </div>
